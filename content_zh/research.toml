[[items]]
title = "方向10：Koopman增强型自适应动态规划导纳控制及实时惯量张量估计"
subtitle = "30篇文献 · 6个集群(A–F) · 2022–2026 · IEEE TRO/RAL/ICRA/IROS"
date = "2022–2026"
content = """
## 概述

升级现有ADP导纳控制器，引入**基于Koopman的惯量张量估计器**，形成三层架构。

### 文献统计：30篇（2024-2026年22篇）

### 三层架构
```
Tier 1 (10Hz):  Koopman惯量张量估计器  ← Koopman理论 + 在线辨识
Tier 2 (50Hz):  物理信息ADP导纳优化器   ← ADP/RL控制 + 无源性
Tier 3 (100Hz): CLIK轨迹执行器         ← 接触控制 + 并联机器人
```

### 六大集群
- **A**: ADP/RL导纳与阻抗控制 (6篇)
- **B**: Koopman算子动力学辨识与控制 (5篇)
- **C**: 空中操作接触控制与耦合 (5篇)
- **D**: 在线动力学辨识与参数估计 (5篇)
- **E**: 能量槽无源性与稳定性保证 (4篇)
- **F**: 并联机械臂与6-RSS专项 (5篇)

### 关键洞察
**"Koopman + 并联空中机械臂"** 是完全未探索的组合——现有Koopman工作仅覆盖多旋翼和地面串联臂。
"""
tags = ["Direction 10", "Koopman算子", "自适应与导纳控制", "在线辨识"]

[[items]]
title = "RP：基于高斯过程在线学习的6-RSS并联空中机械臂接触扰动估计与前馈补偿"
subtitle = "研究计划 · 6-RSS并联空中机械臂 · 阶段二面接触"
date = "2026"
content = """
## 摘要

提出**高斯过程(GP)在线学习框架**，用于6-RSS并联空中机械臂的实时接触扰动估计与前馈补偿。

### 为何选GP而非神经网络？
1. **样本高效**——10-20个接触样本即可合理预测（NN需成百上千）
2. **不确定性量化**——同时输出预测均值和方差
3. **增量在线更新**——Woodbury秩一更新O(N²)，无需重新训练

### 三个组件
1. **GP残差扰动模型**——输入: F/T传感器+双IMU差分+EKF速度；输出: 残差扰动扳手
2. **不确定性感知前馈增益调度**——高置信度→全GP前馈；高不确定性→平滑衰减至ADP基线
3. **集成入CLIK环**——异步ROS2节点，预测100Hz，模型更新10Hz

### 平台优势
1kHz力传感器提供无与伦比的高带宽监督信号；双IMU差分测量基座-动平台相对动态；ADP基线确保GP永不加劣系统。
"""
tags = ["Direction 10", "研究计划", "机器学习", "接触控制"]

