[[items]]
title = "综述：NDOB-Based Control of a UAV with Delta-Arm"
subtitle = "Chen et al., arXiv 2025 · 中山大学HI LAB"
date = "2025"
content = """
## 核心贡献
NDOB + 高通滤波补偿的复合框架。核心创新：**频域扰动分离**——NDOB处理低频分量，高通通道隔离Delta臂高频反作用力。

## 关键指标
Delta臂仅占7.5%重量；末端精度**6mm**；400g负载(30%自重)下定位误差**2.9cm**。

## 局限
频域分离依赖明显频谱间隙——对更重6-RSS可能失效。无直接力传感器，全依赖NDOB。
"""
tags = ["独立综述", "并联机械臂", "扰动观测器"]

[[items]]
title = "综述：FlyAware — 基于视觉估计与抓取后自适应的惯量感知空中操作"
subtitle = "Deng et al., IEEE RA-L 2026 · 中山大学HI LAB"
date = "2026"
content = """
## 核心贡献
视觉惯量估计(抓取前) + 自适应控制(抓取后)。核心洞察：视觉先验为自适应提供"热启动"。

## 与我们的关联
证明"先验估计 + 在线自适应"优于纯自适应。我们的方法用**正运动学**提供先验(vs. FlyAware的视觉先验)——两者都向自适应流程注入已知信息。
"""
