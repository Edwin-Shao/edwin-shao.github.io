[[items]]
title = "方向04：稳定性保证的自适应导纳-阻抗控制及在线耦合动力学辨识"
subtitle = "28篇文献 · 6个子主题(A–F) · 2025–2026 · IEEE TRO/RAL/TMECH/ICRA/IROS"
date = "2025–2026"
content = """
## 概述

针对6-RSS项目的**阶段二**——持续接触力与高频机械臂运动下的稳定面接触操作。核心挑战：现有10Hz ADP导纳自适应无法跟踪100Hz耦合动力学，且为无模型（忽略解析已知的6-RSS正运动学），缺乏形式化稳定性保证。

### 文献统计：28篇（2025年18篇，2026年10篇）

### 六大子主题
- **A**: 自适应阻抗/导纳控制与稳定性保证 (6篇)
- **B**: 在线耦合动力学辨识与未知参数估计 (5篇)
- **C**: 双环协调运动-力控制架构 (4篇)
- **D**: 鲁棒柔顺、无源性及能量槽方法 (4篇)
- **E**: 预测与优化型接触控制 (3篇)
- **F**: 无传感器力估计与并联机器人接触 (6篇)

### 三项核心贡献
1. 注入6-RSS正运动学先验的Lyapunov稳定自适应导纳
2. 基于能量槽的双环柔顺架构（外环UAV导纳20Hz + 内环6-RSS阻抗100Hz）
3. Koopman残差耦合辨识器（1kHz力传感器监督信号）
"""
tags = ["Direction 04", "自适应与导纳控制", "稳定性与无源性"]

[[items]]
title = "RP：稳定性保证的自适应导纳-阻抗控制及在线耦合动力学辨识"
subtitle = "研究计划 · 6-RSS并联空中机械臂 · 阶段一&二"
date = "2026"
content = """
## 摘要

提出具有形式化稳定性保证和在线耦合动力学辨识的自适应导纳-阻抗控制框架，专为6-RSS并联空中机械臂设计。

### 核心洞察
6-RSS闭链正运动学是**解析已知**的——将其作为结构先验注入自适应律，而非视为黑箱。

### 三个模块
1. **运动学先验注入的自适应导纳**（50Hz）——分解耦合力为已知分量+未知残差，仅对残差自适应
2. **能量槽双环柔顺**——外环UAV导纳(20Hz)、内环6-RSS阻抗(100Hz)，能量低时层级让渡
3. **Koopman残差耦合辨识器**——1kHz力传感器直接监督，L1正则化RLS在线剪枝

### 平台优势
- 1kHz六维力传感器 → 力控带宽比GMO方案高10倍
- 6-RSS并联刚度 → 力各向同性、误差平均
- 双400Hz IMU → 基座-动平台差分测量
- EtherCAT(<1ms) → 支撑>100Hz导纳参数在线更新
"""
tags = ["Direction 04", "研究计划", "并联机械臂", "自适应与导纳控制"]

[[items]]
title = "D04-A: 自适应阻抗/导纳控制与稳定性保证"
subtitle = "6篇 · Lyapunov自适应 · 一致最终有界(UUB)稳定性"
date = "2025–2026"
content = """
核心问题：如何在未知UAV-机械臂耦合下**保证稳定性**的同时在线调整阻抗/导纳参数。

**关键论文：**
- **Sharma et al. (2025):** 首个针对未知耦合动力学的Lyapunov稳定性证明。局限：视为全未知→保守增益。增强：注入6-RSS解析运动学先验。
- **Yadav et al. (2025 TMECH):** 模块化解耦自适应框架，无力传感器。优势：1kHz力传感器提供直接监督信号。

**关键缺口：** 无现有工作将并联机构运动学作为结构先验注入自适应阻抗。
"""
tags = ["Direction 04", "自适应与导纳控制"]

