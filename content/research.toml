# ============================================================
# DIRECTION 10 — Research Proposal
# ============================================================
[[items]]
title = "RP: Gaussian Process Online Learning for Contact Disturbance Estimation and Feedforward Compensation"
subtitle = "Research Proposal · 6-RSS Parallel Aerial Manipulator · Stage II Surface Contact"
date = "2026"
content = """
## Abstract

This research proposes a **Gaussian Process (GP)-based online learning framework** for real-time contact disturbance estimation and feedforward compensation in a 6-RSS parallel aerial manipulator.

### Why GP over Neural Networks?
1. **Sample efficient** — reasonable predictions from 10–20 contact samples vs. hundreds for NN
2. **Uncertainty quantification** — outputs both predictive mean (disturbance estimate) AND predictive variance (confidence)
3. **Incremental online updates** — Woodbury rank-1 updates in O(N²), supports continuous learning without retraining

### Three Components
1. **GP Residual Disturbance Model** — input: F/T sensor + dual-IMU differential + EKF end-effector velocity; output: residual disturbance wrench. SE kernel with ARD. Online hyperparameter optimization via marginal likelihood.
2. **Uncertainty-Aware Feedforward Gain Scheduling** — high confidence (low variance) → full GP feedforward; high uncertainty (novel contact) → smoothly attenuate to ADP baseline. Sigmoid mapping from predictive variance to gain.
3. **Integration into CLIK Loop** — GP runs as async ROS 2 node: prediction at 100 Hz (feedforward), model update at 10 Hz (posterior recomputation). Injects at torque level upstream of actuator PID.

### Platform Advantages
- **1 kHz F/T sensor** → high-bandwidth supervised signal unmatched in existing literature
- **Dual 400 Hz IMUs** → unique differential measurement of base-platform dynamics
- **Existing ADP+CLIK baseline** → graceful degradation when GP is uncertain; GP never makes system worse

### Experiments (Stage II)
- 15 cm linear surface scan at 2 cm/s on aluminium, painted steel, compliant foam at 2/5/10 N
- Compare: ADP baseline vs. analytical feedforward vs. GP-augmented
- **Incremental learning test**: repeated scans — hypothesis that GP progressively reduces RMSE
- **Cross-surface generalization**: train on aluminium, test on painted steel
"""
tags = ["Direction 10", "Research Proposal", "Machine Learning", "Contact Control"]

