[[items]]
title = "Review: NDOB-Based Control of a UAV with Delta-Arm Considering Manipulator Dynamics"
subtitle = "Chen et al., arXiv 2025 (Submitted to ICRA) · Sun Yat-sen University, HI LAB"
date = "2025"
content = """
## Core Contribution
A composite control framework combining a **Nonlinear Disturbance Observer (NDOB)** with a **high-pass filter compensation loop** for quadrotors with Delta parallel manipulators. Key innovation: **frequency-domain disturbance separation** — NDOB handles low-frequency components (aerodynamics, payload), high-pass channel isolates high-frequency reaction forces from Delta arm cyclic motion.

## Key Results
- Delta arm: 7.5% of total weight, highly dynamic manipulation
- End-effector tracking: **6 mm** precision
- 400 g payload (30% total mass): positioning within **2.9 cm** at 0.3 g acceleration

## Limitations
- Frequency separation relies on clear spectral gap — may degrade for heavier 6-RSS mechanisms
- No direct force-torque sensor; relies entirely on NDOB estimation (inherent low-pass lag)

## Relevance
The frequency-domain decomposition concept can inform our dual-timescale separation in the three-tier architecture.
"""
tags = ["Standalone Review", "Parallel Manipulator", "Disturbance Observer"]

