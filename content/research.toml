# ============================================================
# DIRECTION 04 — Research Proposal
# ============================================================
[[items]]
title = "RP: Stability-Guaranteed Adaptive Admittance-Impedance Control with Online Coupling Dynamics Identification"
subtitle = "Research Proposal · 6-RSS Parallel Aerial Manipulator · Stage I & II"
date = "2026"
content = """
## Abstract

Aerial manipulators face a fundamental challenge: dynamic coupling between the floating UAV base and onboard manipulator destabilises physical contact operations. This research proposes an adaptive admittance-impedance control framework with **formal stability guarantees** and **online coupling dynamics identification** for a 6-RSS parallel aerial manipulator.

### Key Insight
The 6-RSS closed-chain forward kinematics is **analytically known** — rather than treating it as a black box, inject it as a structural prior into the adaptive law.

### Three Modules
1. **Stability-guaranteed adaptive admittance with kinematic prior** — decompose coupling into known (6-RSS kinematics + dual-IMU) and unknown (residual), adapt only the residual at 50 Hz
2. **Energy-tank dual-loop compliance** — outer UAV admittance (20 Hz), inner 6-RSS impedance (100 Hz), hierarchy-ceding when energy low
3. **Koopman-based residual coupling identifier** — 1 kHz F/T sensor provides direct supervised signal; RLS with L1 regularization; feedforward into impedance controller

### Platform Advantages
- **1 kHz 6-axis F/T sensor** → force control bandwidth 10× higher than GMO-based methods
- **6-RSS parallel stiffness** → force isotropy, error averaging
- **Dual 400 Hz IMUs** → differential measurement of base-platform relative dynamics
- **EtherCAT (<1 ms)** → supports >100 Hz admittance parameter updates

### Experiments
- **Stage I**: hover + grasp 0/100/200 g payloads; compare vs. EKF+CLIK+ADP baseline
- **Stage II**: 10 cm surface scan at 2 cm/s on aluminium/painted steel/rusted steel at 2/5/10 N
- **Ablation**: 8 configurations toggling each module
"""
tags = ["Direction 04", "Research Proposal", "Parallel Manipulator", "Adaptive & Admittance Control"]

