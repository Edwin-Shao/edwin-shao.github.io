[[items]]
title = "D04-A: Adaptive Impedance/Admittance Control & Stability Guarantees"
subtitle = "6 papers · Lyapunov-based adaptation · UUB stability proofs"
date = "2025–2026"
content = """
Core challenge: how to adjust impedance/admittance parameters online while **guaranteeing stability** under unknown UAV-manipulator coupling.

**Key papers:**
- **Sharma et al. (2025, IROS submitted):** First Lyapunov-based stability proof for adaptive impedance with unknown coupling dynamics. Limitation: treats ALL dynamics as unknown → conservative gains, slow convergence. Our enhancement: inject 6-RSS analytical kinematics as prior → faster adaptation.
- **Song et al. (2025 RA-L):** Robust adaptive impedance for contact force tracking with unknown environment stiffness. Novel robust integral of saturation error (RISE) filter.
- **Yadav et al. (2025 TMECH):** Modular adaptive framework with decoupled UAV/manipulator adaptive laws. No force sensor — relies on tracking error. Our advantage: 1 kHz F/T sensor provides direct supervised signal.
- **Additional papers** address port-Hamiltonian formulations, admittance with energy tanks, and RL-based variable impedance learning.

**Key gap:** No existing work injects parallel mechanism kinematics as a structural prior into adaptive impedance — all treat the manipulator as a generic unknown system.
"""
tags = ["Direction 04", "Adaptive & Admittance Control", "Stability & Passivity"]

